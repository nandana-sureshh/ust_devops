version: '3.8'

services:
  # ─── Infrastructure ───
  mongodb:
    image: mongo:7.0
    container_name: healthcare-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - healthcare-net
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: healthcare-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - healthcare-net
    restart: unless-stopped

  # ─── Node.js Services ───
  user-management:
    build: ./services/user-management
    container_name: healthcare-user-management
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongodb:27017/healthcare_users
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: dev-jwt-secret-key-2024
      JWT_EXPIRY: 24h
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - healthcare-net
    restart: unless-stopped

  doctor-appointment:
    build: ./services/doctor-appointment
    container_name: healthcare-doctor-appointment
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGO_URI: mongodb://mongodb:27017/healthcare_doctors
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: dev-jwt-secret-key-2024
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - healthcare-net
    restart: unless-stopped

  lab-appointment:
    build: ./services/lab-appointment
    container_name: healthcare-lab-appointment
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      MONGO_URI: mongodb://mongodb:27017/healthcare_labs
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: dev-jwt-secret-key-2024
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - healthcare-net
    restart: unless-stopped

  ambulance-booking:
    build: ./services/ambulance-booking
    container_name: healthcare-ambulance-booking
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      MONGO_URI: mongodb://mongodb:27017/healthcare_ambulance
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: dev-jwt-secret-key-2024
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - healthcare-net
    restart: unless-stopped

  # ─── Python Services ───
  pharmacy:
    build: ./services/pharmacy
    container_name: healthcare-pharmacy
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      MONGO_URI: mongodb://mongodb:27017/healthcare_pharmacy
    depends_on:
      - mongodb
    networks:
      - healthcare-net
    restart: unless-stopped

  medical-records:
    build: ./services/medical-records
    container_name: healthcare-medical-records
    ports:
      - "5002:5002"
    environment:
      PORT: 5002
      MONGO_URI: mongodb://mongodb:27017/healthcare_records
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - healthcare-net
    restart: unless-stopped

  # ─── Frontend ───
  frontend:
    build: ./frontend
    container_name: healthcare-frontend
    ports:
      - "3000:3000"
    depends_on:
      - user-management
      - doctor-appointment
      - pharmacy
      - medical-records
      - lab-appointment
      - ambulance-booking
    networks:
      - healthcare-net
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  healthcare-net:
    driver: bridge
