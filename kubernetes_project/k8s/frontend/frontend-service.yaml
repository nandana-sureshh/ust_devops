# ─── Frontend NodePort Service ───
# NodePort is used for the frontend in the initial phase
# This allows direct browser access via <NodeIP>:30000
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: frontend
  labels:
    app: frontend
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
      protocol: TCP
