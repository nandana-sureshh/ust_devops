# ─── Medical Records Deployment (Python Flask + RabbitMQ consumer) ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medical-records
  namespace: backend
  labels:
    app: medical-records
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medical-records
  template:
    metadata:
      labels:
        app: medical-records
        tier: backend
    spec:
      containers:
        - name: medical-records
          image: revanth654/healthcare-medical-records:v2
          imagePullPolicy: Always
          ports:
            - containerPort: 5002
          env:
            - name: PORT
              value: "5002"
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: MONGO_URI
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: RABBITMQ_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 15
            periodSeconds: 5
      restartPolicy: Always
