# ─── Pharmacy Deployment (Python Flask) ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pharmacy
  namespace: backend
  labels:
    app: pharmacy
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pharmacy
  template:
    metadata:
      labels:
        app: pharmacy
        tier: backend
    spec:
      containers:
        - name: pharmacy
          image: revanth654/healthcare-pharmacy:v2
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
          env:
            - name: PORT
              value: "5001"
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: MONGO_URI
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 5
      restartPolicy: Always
