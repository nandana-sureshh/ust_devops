# ─── HTTPRoutes for all backend services ───
# Path-based routing: /api/<service>/* → corresponding ClusterIP service
# Aggregator REMOVED — frontend calls services directly via Gateway

# User Management
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: user-management-route
  namespace: backend
spec:
  parentRefs:
    - name: healthcare-gateway
      namespace: ingress
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/users
      backendRefs:
        - name: user-management
          port: 3001
---
