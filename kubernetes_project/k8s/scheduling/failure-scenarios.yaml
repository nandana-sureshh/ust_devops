# ═══════════════════════════════════════════════════════
# FAILURE SCENARIOS — For learning and debugging practice
# Apply these one at a time, observe, then delete.
# ═══════════════════════════════════════════════════════

# ─── Scenario 1: Pod crash (bad image tag) ───
# Expected: ImagePullBackOff → CrashLoopBackOff
# Debug: kubectl describe pod -n backend -l experiment=bad-image
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fail-bad-image
  namespace: backend
  labels:
    experiment: bad-image
spec:
  replicas: 1
  selector:
    matchLabels:
      experiment: bad-image
  template:
    metadata:
      labels:
        experiment: bad-image
    spec:
      containers:
        - name: broken
          image: healthcare/pharmacy:non-existent-tag-12345
          ports:
            - containerPort: 5001
---
# ─── Scenario 2: Wrong Secret reference ───
# Expected: Pod stuck in CreateContainerConfigError
# Debug: kubectl describe pod -n backend -l experiment=bad-secret
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fail-bad-secret
  namespace: backend
  labels:
    experiment: bad-secret
spec:
  replicas: 1
  selector:
    matchLabels:
      experiment: bad-secret
  template:
    metadata:
      labels:
        experiment: bad-secret
    spec:
      containers:
        - name: broken
          image: revanth654/healthcare-user-management:v2
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: non-existent-secret
                  key: JWT_SECRET
---
# ─── Scenario 3: Impossible nodeSelector (scheduling failure) ───
# Expected: Pod stuck in Pending state
# Debug: kubectl describe pod -n backend -l experiment=bad-selector
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fail-bad-selector
  namespace: backend
  labels:
    experiment: bad-selector
spec:
  replicas: 1
  selector:
    matchLabels:
      experiment: bad-selector
  template:
    metadata:
      labels:
        experiment: bad-selector
    spec:
      nodeSelector:
        gpu: nvidia-a100 # No such node exists
      containers:
        - name: broken
          image: revanth654/healthcare-lab-appointment:v2
          ports:
            - containerPort: 3003
---
# ─── Scenario 4: OOMKilled (very low memory limit) ───
# Expected: Pod starts then gets OOMKilled
# Debug: kubectl describe pod -n backend -l experiment=oom-kill
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fail-oom-kill
  namespace: backend
  labels:
    experiment: oom-kill
spec:
  replicas: 1
  selector:
    matchLabels:
      experiment: oom-kill
  template:
    metadata:
      labels:
        experiment: oom-kill
    spec:
      containers:
        - name: broken
          image: revanth654/healthcare-user-management:v2
          resources:
            limits:
              memory: 10Mi # Way too low for Node.js
              cpu: 50m
---
# ─── Scenario 5: Failing liveness probe ───
# Expected: Pod keeps restarting (CrashLoopBackOff)
# Debug: kubectl describe pod -n backend -l experiment=bad-probe
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fail-bad-probe
  namespace: backend
  labels:
    experiment: bad-probe
spec:
  replicas: 1
  selector:
    matchLabels:
      experiment: bad-probe
  template:
    metadata:
      labels:
        experiment: bad-probe
    spec:
      containers:
        - name: broken
          image: revanth654/healthcare-lab-appointment:v2
          ports:
            - containerPort: 3003
          livenessProbe:
            httpGet:
              path: /nonexistent-health-endpoint
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 2
