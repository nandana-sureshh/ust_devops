# ─── Backend Secrets ───
# NOTE: In real usage, never commit secrets to git.
# Values below are base64-encoded for learning purposes.
#   echo -n 'value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: backend
type: Opaque
data:
  # "healthcare-jwt-secret-2024" base64-encoded
  JWT_SECRET: aGVhbHRoY2FyZS1qd3Qtc2VjcmV0LTIwMjQ=
  # "mongoAdminPass123" base64-encoded
  MONGO_PASSWORD: bW9uZ29BZG1pblBhc3MxMjM=
---
# ─── Infra Secrets (MongoDB credentials) ───
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secrets
  namespace: infra
type: Opaque
data:
  # "admin" base64-encoded
  MONGO_INITDB_ROOT_USERNAME: YWRtaW4=
  # "mongoAdminPass123" base64-encoded
  MONGO_INITDB_ROOT_PASSWORD: bW9uZ29BZG1pblBhc3MxMjM=
