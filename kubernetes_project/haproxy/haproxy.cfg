#---------------------------------------------------------------------
# HAProxy Configuration for Healthcare Microservices
# Sits OUTSIDE the Kubernetes cluster
# Forwards traffic → K8s Gateway API (via NodePort 30080)
#---------------------------------------------------------------------

global
    log stdout format raw local0
    maxconn 4096
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    retries 3

#---------------------------------------------------------------------
# Frontend: Stats page for monitoring HAProxy
#---------------------------------------------------------------------
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE

#---------------------------------------------------------------------
# Frontend: Accept incoming HTTP traffic on port 80
#---------------------------------------------------------------------
frontend http_front
    bind *:80
    default_backend k8s_gateway

#---------------------------------------------------------------------
# Backend: Forward all traffic to K8s Gateway API NodePort
# In production, list all K8s worker node IPs here
#---------------------------------------------------------------------
backend k8s_gateway
    balance roundrobin
    option httpchk GET /healthz
    http-check expect status 200

    # Replace with your actual K8s worker node IPs
    # Each worker node exposes the Gateway via NodePort 30080
    server k8s-worker-1 <WORKER_NODE_1_IP>:30080 check inter 5s fall 3 rise 2
    server k8s-worker-2 <WORKER_NODE_2_IP>:30080 check inter 5s fall 3 rise 2
    # server k8s-worker-3 <WORKER_NODE_3_IP>:30080 check inter 5s fall 3 rise 2

