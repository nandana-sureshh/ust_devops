
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: toleration-ds
spec:
  selector:
    matchLabels:
      app: toleration-demo
  template:
    metadata:
      labels:
        app: toleration-demo
    spec:
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: busybox
        image: busybox
        command: ["sh", "-c", "sleep 3600"]
