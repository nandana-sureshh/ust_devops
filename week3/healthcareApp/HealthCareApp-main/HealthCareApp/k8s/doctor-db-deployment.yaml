apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doctor-db
  template:
    metadata:
      labels:
        app: doctor-db
    spec:
      containers:
      - name: doctor-db
        image: mysql:8
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: healthcare_root_2024
        - name: MYSQL_DATABASE
          value: doctor_db
