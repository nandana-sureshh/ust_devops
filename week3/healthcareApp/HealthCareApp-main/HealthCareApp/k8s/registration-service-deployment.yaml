apiVersion: apps/v1
kind: Deployment
metadata:
  name: registration-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registration-service
  template:
    metadata:
      labels:
        app: registration-service
    spec:
      containers:
      - name: registration-service
        image: revanth654/registration-service:v1
        ports:
        - containerPort: 3004
        env:
        - name: PORT
          value: "3004"
        - name: DB_HOST
          value: registration-db
        - name: DB_USER
          value: root
        - name: DB_PASSWORD
          value: healthcare_root_2024
        - name: DB_NAME
          value: registration_db
