apiVersion: v1
kind: Pod
metadata:
  name: affinity-and
  namespace: scheduling-demo
spec:
  containers:
  - name: nginx
    image: nginx
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: gpu
            operator: Exists
          - key: disk
            operator: In
            values:
            - ssd
