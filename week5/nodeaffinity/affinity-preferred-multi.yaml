apiVersion: v1
kind: Pod
metadata:
  name: affinity-preferred-multi
  namespace: scheduling-demo
spec:
  containers:
  - name: nginx
    image: nginx
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 80
        preference:
          matchExpressions:
          - key: env
            operator: In
            values:
            - prod

      - weight: 30
        preference:
          matchExpressions:
          - key: disk
            operator: In
            values:
            - ssd

      - weight: 20
        preference:
          matchExpressions:
          - key: gpu
            operator: In
            values:
            - "true"
